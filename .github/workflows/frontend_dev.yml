name: Deploy Static Web App - Frontend - My Fin App Dev

on:
  push:
    branches:
      - dev
    paths:
      - front-end/**
      - .github/workflows/frontend_dev.yml
  pull_request:
    branches:
      - dev
    paths:
      - front-end/**
      - .github/workflows/frontend_dev.yml
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: frontend-dev-deploy
  cancel-in-progress: true

jobs:
  deploy_production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Deploy Production
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_GLACIER_0B5D60D10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "front-end"
          api_location: ""
          output_location: "build"
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_DEV }}

  deploy_preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Deploy Preview
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
      - name: Build And Deploy Preview
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_GLACIER_0B5D60D10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "front-end"
          api_location: ""
          output_location: "build"
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_DEV }}
